name: Publish Package

on:
  workflow_dispatch:  # Manual trigger
    inputs:
      test_mode:
        description: 'Run in test mode (on test branch)'
        required: true
        default: false
        type: boolean
      test_branch:
        description: 'Test branch name (only used if test_mode is true)'
        required: false
        default: 'test-release'
        type: string
  push:
    branches:
      - develop
    paths:
      - 'CHANGELOG.md'

jobs:
  publish:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code with full history
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}
          ref: ${{ github.event.inputs.test_mode && github.event.inputs.test_branch || 'develop' }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install poetry
          pip install twine

      - name: Check commit and bump version
        id: version
        env:
          GITHUB_OUTPUT: ${{ github.output }}
          TEST_MODE: ${{ github.event.inputs.test_mode || 'false' }}
        run: .github/scripts/check_and_bump.sh

      - name: Build and publish to PyPI
        id: pypi
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
          TEST_MODE: ${{ github.event.inputs.test_mode || 'false' }}
        run: .github/scripts/build_and_publish.sh

      - name: Merge and create release
        if: success() && github.event.inputs.test_mode != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          NEW_VERSION: ${{ steps.version.outputs.NEW_VERSION }}
        run: .github/scripts/merge_and_release.sh

      - name: Create GitHub Release
        if: success() && github.event.inputs.test_mode != 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.NEW_VERSION }}
          name: "Release v${{ steps.version.outputs.NEW_VERSION }}"
          body: |
            Release notes will be automatically generated
            from the commits between versions.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }} 
